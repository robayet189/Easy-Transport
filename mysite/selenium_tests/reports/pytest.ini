[pytest]
# Django settings for pytest
DJANGO_SETTINGS_MODULE = mysite.settings

# Test discovery settings
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output and reporting
addopts = 
    --html=reports/test_report.html
    --self-contained-html
    -v
    --tb=short
    -s
    --base-url=http://127.0.0.1:8000

# Selenium-specific settings
# Timeout for explicit waits (seconds)
selenium_wait_timeout = 10
selenium_implicit_wait = 3

# Base URL for tests (can be overridden via command line)
base_url = http://127.0.0.1:8000

# Markers for categorizing tests
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    smoke: marks tests as smoke tests for quick validation
    booking: marks tests related to booking functionality
    auth: marks tests related to authentication

# Logging configuration
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Warnings configuration
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

# Parallel execution (optional, requires pytest-xdist)
# addopts = -n auto

# Coverage configuration (optional, requires pytest-cov)
# addopts = --cov=myapp --cov-report=html
# Additional pytest configurations can be added here as needed, such as markers, fixtures, etc.