[pytest]
# CRITICAL: Django settings - MUST match your project
DJANGO_SETTINGS_MODULE = mysite.settings

# Disable auto project detection (prevents path issues)
django_find_project = false

# Test discovery
python_files = tests/*.py
python_classes = Test*
python_functions = test_*
testpaths = tests

# Options
addopts = 
    --html=reports/booking_test.html
    --self-contained-html
    -v
    --tb=short
    -s
    --base-url=http://127.0.0.1:8000

# Warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::RuntimeWarning