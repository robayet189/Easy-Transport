{% load static %}
<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <!-- Character encoding for proper text display -->
    <meta charset="UTF-8">
    <!-- Responsive design viewport settings -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Page title for browser tab -->
    <title>Login — Easy Transport</title>
    
    <!-- Google Fonts for typography -->
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:opsz,wght@9..40,400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- CSS Styles - Theme variables, layout, and animations -->
    <style>
        /* Reset default browser styles */
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        
        /* Dark mode theme variables (default for login page) */
        :root, [data-theme="dark"] {
            --bg: #0b0b14; --card: #13131f; --card2: #16162a;
            --red: #ff4757; --orange: #ff6b35; --text: #ffffff;
            --muted: #9090b0; --dim: #50507a; --border: rgba(255,255,255,0.08);
            --input-bg: #0f0f20; --input-border: rgba(255,255,255,0.1);
            --nav-bg: rgba(11,11,20,0.92); --toast-bg: #1a1a30;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --glow: rgba(255,71,87,0.3);
        }
        
        /* Light mode theme variables */
        [data-theme="light"] {
            --bg: #f5f7fb; --card: #ffffff; --card2: #ffffff;
            --red: #e63946; --orange: #f4a261; --text: #1e293b;
            --muted: #5b6e8c; --dim: #8c9bb0; --border: rgba(0,0,0,0.08);
            --input-bg: #ffffff; --input-border: rgba(0,0,0,0.12);
            --nav-bg: rgba(255,255,255,0.92); --toast-bg: #ffffff;
            --glow: rgba(230,57,70,0.2);
        }
        
        /* Smooth scrolling for anchor links */
        html { scroll-behavior: smooth; }
        
        /* Base body styles with theme transition */
        body {
            background: var(--bg); color: var(--text);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
            overflow-x: hidden; padding: 20px;
            transition: background 0.3s ease, color 0.2s ease;
            position: relative;
        }
        
        /* Animated background gradient effect */
        body::before {
            content: ''; position: fixed; inset: 0;
            background: radial-gradient(ellipse 800px 600px at 20% 20%, rgba(255,71,87,0.08) 0%, transparent 60%),
                        radial-gradient(ellipse 600px 500px at 80% 80%, rgba(255,107,53,0.08) 0%, transparent 60%);
            pointer-events: none; z-index: 0; transition: opacity 0.3s;
            animation: float 20s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(20px, 20px); }
        }
        
        /* Subtle grid pattern overlay */
        body::after {
            content: ''; position: fixed; inset: 0;
            background-image: linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
            background-size: 60px 60px; pointer-events: none; z-index: 0;
        }
        body.light::after {
            background-image: linear-gradient(rgba(0,0,0,0.03) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(0,0,0,0.03) 1px, transparent 1px);
        }
        
        /* Top navigation bar styles */
        nav {
            position: fixed; top: 0; left: 0; right: 0; z-index: 100;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 48px; height: 72px; background: var(--nav-bg);
            backdrop-filter: blur(20px); border-bottom: 1px solid var(--border);
            transition: var(--transition);
        }
        
        /* Logo styling */
        .logo { display: flex; align-items: center; gap: 14px; text-decoration: none; }
        .logo-icon-custom {
            width: 75px; height: 65px; background: transparent; border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
        }
        .logo-text {
            font-family: 'Syne', sans-serif; font-size: 24px; font-weight: 800;
            background: linear-gradient(135deg, #fff, var(--orange));
            -webkit-background-clip: text; background-clip: text; color: transparent;
        }
        body.light .logo-text {
            background: linear-gradient(135deg, var(--red), var(--orange));
            -webkit-background-clip: text; background-clip: text;
        }
        
        /* Navigation right section */
        .nav-right { display: flex; align-items: center; gap: 20px; }
        .nav-register {
            color: var(--muted); text-decoration: none; font-size: 14px;
            padding: 8px 18px; border-radius: 999px; background: rgba(255,71,87,0.08);
            transition: 0.3s;
        }
        .nav-register strong { color: var(--red); }
        .nav-register:hover { color: white; background: rgba(255,71,87,0.15); }
        
        /* Theme toggle button */
        .theme-toggle {
            width: 48px; height: 48px; border-radius: 999px; background: var(--card2);
            border: 1px solid var(--border); cursor: pointer; display: flex;
            align-items: center; justify-content: center; font-size: 22px;
            transition: all 0.4s var(--transition); position: relative; overflow: hidden;
        }
        .theme-toggle:hover { transform: scale(1.05); border-color: var(--red); box-shadow: 0 0 12px var(--glow); }
        .theme-toggle .toggle-icon { transition: transform 0.4s cubic-bezier(0.34, 1.2, 0.64, 1); display: inline-block; }
        .theme-toggle:hover .toggle-icon { transform: rotate(15deg); }
        
        /* Main content wrapper with animation */
        .wrapper {
            position: relative; z-index: 1; width: 100%; max-width: 480px;
            margin: 72px auto 30px; animation: fadeUp 0.7s ease both;
        }
        
        @keyframes fadeUp { from { opacity: 0; transform: translateY(32px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Login card styling */
        .card {
            background: var(--card); border: 1px solid var(--border); border-radius: 32px;
            padding: 44px 44px 48px; backdrop-filter: blur(30px);
            box-shadow: 0 40px 100px rgba(0,0,0,0.3); transition: var(--transition);
            position: relative; overflow: hidden;
        }
        body.light .card { box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
        
        /* Animated pulse effect on card */
        .card::before {
            content: ''; position: absolute; top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(255,71,87,0.05) 0%, transparent 70%);
            animation: pulse 8s ease-in-out infinite; pointer-events: none;
        }
        
        @keyframes pulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 0.8; } }
        
        /* Card header section */
        .card-header { text-align: center; margin-bottom: 32px; position: relative; z-index: 1; }
        
        .brand-pill {
            display: inline-flex; align-items: center; gap: 8px;
            background: rgba(255,71,87,0.1); border: 1px solid rgba(255,71,87,0.2);
            border-radius: 999px; padding: 6px 18px; font-size: 12px; font-weight: 600; color: var(--red);
            margin-bottom: 20px;
        }
        .brand-pill .dot { width: 6px; height: 6px; background: var(--red); border-radius: 50%; animation: pulse 2s infinite; }
        
        .card-header h1 {
            font-family: 'Syne', sans-serif; font-size: 32px; font-weight: 800;
            background: linear-gradient(135deg, #fff, var(--orange));
            -webkit-background-clip: text; background-clip: text; color: transparent;
            margin-bottom: 8px;
        }
        body.light .card-header h1 {
            background: linear-gradient(135deg, var(--red), var(--orange));
            -webkit-background-clip: text; background-clip: text;
        }
        .card-header p { color: var(--muted); font-size: 14px; }
        
        /* Form group styling */
        .form-group { margin-bottom: 24px; position: relative; }
        
        label {
            display: block; font-size: 13px; font-weight: 600;
            color: var(--muted); margin-bottom: 8px;
        }
        label span.req { color: var(--red); margin-left: 3px; }
        
        /* Input field wrapper for icons */
        .input-wrap { position: relative; }
        .input-wrap .icon {
            position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
            font-size: 16px; opacity: 0.5; pointer-events: none;
        }
        
        /* Input field styling */
        input {
            width: 100%; background: var(--input-bg); border: 1.5px solid var(--input-border);
            border-radius: 14px; color: var(--text); font-family: 'DM Sans', sans-serif;
            font-size: 14px; padding: 13px 16px 13px 42px; outline: none;
            transition: all 0.3s;
        }
        input:focus {
            border-color: var(--red); background: rgba(255,71,87,0.05);
            box-shadow: 0 0 0 3px rgba(255,71,87,0.12);
        }
        
        /* Password visibility toggle button */
        .input-wrap .eye-btn {
            position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
            background: none; border: none; cursor: pointer; font-size: 16px;
            color: var(--dim); transition: color 0.2s;
        }
        .eye-btn:hover { color: var(--red); }
        
        /* Login button with gradient and loading state */
        .btn-login {
            width: 100%; padding: 15px;
            background: linear-gradient(135deg, var(--red), var(--orange));
            border: none; border-radius: 16px; color: white;
            font-size: 16px; font-weight: 700; cursor: pointer;
            margin-top: 18px; box-shadow: 0 8px 30px var(--glow);
            transition: all 0.3s; position: relative; overflow: hidden;
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 16px 40px rgba(255,71,87,0.5);
        }
        .btn-login:active { transform: translateY(0); }
        .btn-login.loading { pointer-events: none; opacity: 0.8; }
        .btn-login .btn-text { transition: opacity 0.2s; }
        .btn-login.loading .btn-text { opacity: 0; }
        
        /* Loading spinner animation */
        .btn-login .spinner {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 20px; height: 20px; border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white; border-radius: 50%;
            animation: spin 0.7s linear infinite; display: none;
        }
        .btn-login.loading .spinner { display: block; }
        
        @keyframes spin { to { transform: translate(-50%, -50%) rotate(360deg); } }
        
        /* Divider between login methods */
        .divider {
            display: flex; align-items: center; gap: 12px;
            margin: 28px 0; color: var(--dim); font-size: 13px;
        }
        .divider::before, .divider::after {
            content: ''; flex: 1; height: 1px; background: var(--border);
        }
        
        /* Social login buttons */
        .social-login {
            display: flex; gap: 12px;
        }
        .social-btn {
            flex: 1; padding: 12px; background: var(--input-bg);
            border: 1.5px solid var(--input-border); border-radius: 14px;
            color: var(--text); font-size: 14px; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            transition: all 0.2s;
        }
        .social-btn:hover { border-color: var(--red); background: rgba(255,71,87,0.05); }
        
        /* Registration link */
        .register-link {
            text-align: center; margin-top: 26px; font-size: 14px; color: var(--muted);
        }
        .register-link a {
            color: var(--red); text-decoration: none; font-weight: 600;
            transition: color 0.2s;
        }
        .register-link a:hover { text-decoration: underline; }
        
        /* Toast notification styling */
        .toast {
            position: fixed; bottom: 30px; right: 30px;
            background: var(--toast-bg); border: 1px solid rgba(74,222,128,0.3);
            border-radius: 14px; padding: 14px 22px; display: flex;
            align-items: center; gap: 12px; font-size: 14px; color: #4ade80;
            z-index: 999; transform: translateY(80px); opacity: 0;
            transition: all 0.4s cubic-bezier(0.16,1,0.3,1);
            backdrop-filter: blur(16px);
        }
        .toast.show { transform: translateY(0); opacity: 1; }
        .toast.error { border-color: rgba(255,71,87,0.3); color: var(--red); }
        
        /* Responsive design for mobile devices */
        @media (max-width: 560px) {
            .card { padding: 32px 24px 36px; }
            nav { padding: 0 20px; }
            .logo-text { font-size: 20px; }
            .logo-icon-custom { width: 38px; height: 38px; }
            .theme-toggle { width: 42px; height: 42px; font-size: 18px; }
        }
    </style>
</head>
<body>

<!-- Top navigation bar -->
<nav>
    <a href="{% url 'homepage' %}" class="logo">
        <div class="logo-icon-custom">
            <!-- Application logo -->
            <img style="width: 100%; height: 100%" src="{% static 'app1/logo.png' %}" alt="Easy Transport Logo">
        </div>
        <span class="logo-text">Easy Transport</span>
    </a>
    <div class="nav-right">
        <!-- Link to registration page -->
        <a href="{% url 'register_page' %}" class="nav-register">Don't have an account? <strong>Register →</strong></a>
        <!-- Theme toggle button for dark/light mode -->
        <div class="theme-toggle" id="themeToggle" data-testid="theme-toggle">
            <span class="toggle-icon" id="toggleIcon">🌙</span>
        </div>
    </div>
</nav>

<!-- Main content wrapper with login card -->
<div class="wrapper">
    <div class="card">
        <div class="card-header">
            <div class="brand-pill"><span class="dot"></span> Smart Transport</div>
            <h1>Welcome Back</h1>
            <p>Sign in to continue your journey</p>
        </div>

        <!-- Login form with CSRF token for Django security -->
        <form id="loginForm" data-testid="login-form">
            {% csrf_token %}
            
            <!-- Username/Email input field -->
            <div class="form-group">
                <label for="username">Email or Username <span class="req">*</span></label>
                <div class="input-wrap">
                    <span class="icon">👤</span>
                    <!-- Input with data-testid for Selenium testing -->
                    <input type="text" name="username" id="username" data-testid="username-input" 
                           placeholder="Enter your email or username" required autocomplete="username">
                </div>
            </div>

            <!-- Password input field with visibility toggle -->
            <div class="form-group">
                <label for="password">Password <span class="req">*</span></label>
                <div class="input-wrap">
                    <span class="icon">🔒</span>
                    <!-- Password input with data-testid for Selenium -->
                    <input type="password" name="password" id="password" data-testid="password-input" 
                           placeholder="Enter your password" required autocomplete="current-password">
                    <!-- Toggle password visibility button -->
                    <button class="eye-btn" type="button" onclick="togglePwd('password', this)" 
                            aria-label="Toggle password visibility" data-testid="password-toggle">👁️</button>
                </div>
            </div>

            <!-- Login submit button with loading state -->
            <button type="submit" class="btn-login" id="loginBtn" data-testid="login-button">
                <span class="btn-text">🚀 Sign In</span>
                <div class="spinner"></div>
            </button>
        </form>

        <!-- Divider between login methods -->
        <div class="divider">or continue with</div>

        <!-- Social login buttons (placeholder for future integration) -->
        <div class="social-login">
            <button class="social-btn" data-testid="google-login">🔵 Google</button>
            <button class="social-btn" data-testid="facebook-login">🔷 Facebook</button>
        </div>

        <!-- Link to registration page -->
        <div class="register-link">
            New to Easy Transport? <a href="{% url 'register_page' %}" data-testid="register-link">Create an account</a>
        </div>
    </div>
</div>

<!-- Toast notification container for success/error messages -->
<div class="toast" id="toast" data-testid="toast-notification">
    <span id="toastIcon" data-testid="toast-icon">✅</span>
    <span id="toastMsg" data-testid="toast-message"></span>
</div>

<!-- JavaScript for interactivity and form handling -->
<script>
    // ========================================================================
    // THEME TOGGLE FUNCTIONALITY
    // Handles switching between dark and light mode with localStorage persistence
    // ========================================================================
    const themeToggle = document.getElementById('themeToggle');
    const toggleIcon = document.getElementById('toggleIcon');
    const html = document.documentElement;
    
    // Load saved theme preference from localStorage or default to dark mode
    const savedTheme = localStorage.getItem('loginTheme') || 'dark';
    html.setAttribute('data-theme', savedTheme);
    toggleIcon.textContent = savedTheme === 'dark' ? '☀️' : '🌙';

    // Toggle theme on button click and save preference
    themeToggle.addEventListener('click', () => {
        const current = html.getAttribute('data-theme');
        const next = current === 'dark' ? 'light' : 'dark';
        html.setAttribute('data-theme', next);
        localStorage.setItem('loginTheme', next);
        toggleIcon.textContent = next === 'dark' ? '☀️' : '🌙';
        // Add small animation effect on toggle
        themeToggle.style.transform = 'scale(0.95)';
        setTimeout(() => { themeToggle.style.transform = ''; }, 150);
    });

    // ========================================================================
    // PASSWORD VISIBILITY TOGGLE
    // Shows/hides password text in the input field
    // ========================================================================
    function togglePwd(id, btn) {
        const inp = document.getElementById(id);
        if (inp.type === 'password') {
            inp.type = 'text';
            btn.textContent = '🙈';
        } else {
            inp.type = 'password';
            btn.textContent = '👁️';
        }
    }

    // ========================================================================
    // TOAST NOTIFICATION FUNCTION
    // Displays temporary success or error messages to the user
    // ========================================================================
    function showToast(msg, isError = false) {
        const toast = document.getElementById('toast');
        const msgEl = document.getElementById('toastMsg');
        const iconEl = document.getElementById('toastIcon');
        
        // Safety check: ensure elements exist before manipulating
        if (!toast || !msgEl || !iconEl) return;
        
        // Update toast content and styling
        msgEl.textContent = msg;
        iconEl.textContent = isError ? '❌' : '✅';
        toast.className = `toast show${isError ? ' error' : ''}`;
        
        // Auto-hide toast after 3.5 seconds
        setTimeout(() => { toast.classList.remove('show'); }, 3500);
    }

    // ========================================================================
    // CSRF TOKEN HELPER FOR AJAX REQUESTS
    // Retrieves CSRF token from cookies for Django form protection
    // ========================================================================
    function getCookie(name) {
        let cookieValue = null;
        if (document.cookie && document.cookie !== '') {
            const cookies = document.cookie.split(';');
            for (let i = 0; i < cookies.length; i++) {
                const cookie = cookies[i].trim();
                if (cookie.substring(0, name.length + 1) === (name + '=')) {
                    cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                    break;
                }
            }
        }
        return cookieValue;
    }

    // ========================================================================
    // ✅ FIXED: LOGIN FORM SUBMISSION HANDLER
    // Handles form submission via AJAX with proper session cookie handling
    // ========================================================================
    document.getElementById('loginForm').addEventListener('submit', async function(e) {
        e.preventDefault(); // Prevent default form submission (full page reload)
        
        // Get form values and trim whitespace
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;
        const btn = document.getElementById('loginBtn');
        
        // Basic validation: ensure both fields are filled
        if (!username || !password) {
            showToast('Please enter both username/email and password', true);
            return;
        }
        
        // Show loading state on button
        btn.classList.add('loading');
        
        try {
            // Prepare form data for POST request
            const formData = new FormData();
            formData.append('username', username);
            formData.append('password', password);
            formData.append('csrfmiddlewaretoken', getCookie('csrftoken'));
            
            // ✅ FIXED: Send AJAX request with credentials: 'same-origin'
            // This ensures session cookies are included with the request
            const response = await fetch('/api/login/', {
                method: 'POST',
                body: formData,
                headers: { 
                    'X-Requested-With': 'XMLHttpRequest',  // Mark as AJAX request
                    'Accept': 'application/json'            // Expect JSON response
                },
                credentials: 'same-origin'  // ✅ CRITICAL: Include session cookies for authentication
            });
            
            // Handle HTTP error responses
            if (!response.ok) {
                const errorData = await response.json().catch(() => ({ message: 'Server error' }));
                throw new Error(errorData.message || `HTTP ${response.status}`);
            }
            
            // Parse JSON response from backend
            const data = await response.json();
            
            // Handle successful login
            if (data.success) {
                showToast(data.message || 'Login successful!');
                
                // ✅ FIXED: Use FULL PAGE REDIRECT after login
                // This ensures browser loads fresh page with correct session state
                // SPA navigation after login can cause session sync issues
                setTimeout(() => {
                    // Use window.location.href for full page load (not AJAX)
                    // This guarantees session cookies are properly synchronized
                    window.location.href = data.redirect_url || '/dashboard/';
                }, 800);  // Small delay for toast to be visible
                
            } else {
                // Show error message from backend
                showToast(data.message || 'Invalid credentials', true);
            }
        } catch (error) {
            // Log error to console for debugging
            console.error('Login error:', error);
            // Show user-friendly error message
            showToast(error.message || 'Login failed. Please try again.', true);
        } finally {
            // Remove loading state regardless of outcome
            btn.classList.remove('loading');
        }
    });

    // ========================================================================
    // AUTO-FOCUS USERNAME FIELD ON PAGE LOAD
    // Improves user experience by focusing first input field
    // ========================================================================
    document.addEventListener('DOMContentLoaded', function() {
        const usernameInput = document.getElementById('username');
        if (usernameInput && !usernameInput.value) {
            usernameInput.focus();
        }
    });
</script>
</body>
</html>
